policies:
  timestamp: synthetic event timestamp only
  cost_model: no costs; descriptor validation only
  fill_model: no fills; descriptor validation only
  risk_model: no capital at risk
  settlement: not applicable

safety:
  live_trading_enabled: false
  real_order_path_available: false
  credentials_required: false
