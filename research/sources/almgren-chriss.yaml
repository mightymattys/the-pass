bibliography: "Almgren and Chriss. Optimal Execution of Portfolio Transactions. 2000."
claim: Execution schedules trade off expected temporary/permanent market impact against price-risk variance.
evidence: The model formulates an efficient frontier between expected transaction cost and execution risk for portfolio liquidation.
limitations: The stylized linear-impact assumptions and large-order setting do not directly model queue position or crypto venue outages.
market_applicability: [futures, crypto]
tradable_implication: Capacity and impact must be explicit even when the first simulator uses a conservative approximation.
