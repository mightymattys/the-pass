schema_version: 2
id: gate-checker
owner: framework_auditor
trigger: {schedule: "external-daily"}
command: gate_checker
inputs: {roadmap: docs/implementation/roadmap-status.yaml}
allowed_writes: [reports/automation]
forbidden_actions: [gate_decision, live_transaction, credential_access]
timeout_seconds: 300
retry_policy: {max_attempts: 1, idempotent_only: true}
alert_sink: local_incident_artifact
freeze_procedure: report only; never change gate state
enabled: true
