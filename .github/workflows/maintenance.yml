name: Maintenance Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 6 1 * *"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Install locked environment
        run: uv sync --locked --extra data --extra research
      - name: Public safety validation
        run: uv run python scripts/validate_public_repo.py
      - name: Dependency vulnerability audit
        run: uv run --with pip-audit pip-audit
      - name: Research link and recency evidence
        id: links
        continue-on-error: true
        run: uv run python scripts/check_research_links.py --network --output reports/network/research-links.json
      - name: Archive maintenance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maintenance-audit
          path: reports/network/
