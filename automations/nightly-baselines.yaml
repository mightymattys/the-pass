schema_version: 2
id: nightly-baselines
owner: strategy_implementer
trigger: {schedule: "external-nightly"}
command: nightly_baselines
inputs: {suite: b2-public-baselines}
allowed_writes: [reports/automation]
forbidden_actions: [gate_decision, live_transaction, credential_access]
timeout_seconds: 1800
retry_policy: {max_attempts: 1, idempotent_only: true}
alert_sink: local_incident_artifact
freeze_procedure: preserve previous baseline evidence and open incident
enabled: true
