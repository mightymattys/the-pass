status: ready_for_spec
proposed_name: OxfordStrat volatility-squeeze ablation
source_notes: [research/sources/oxfordstrat-volatility-squeeze.yaml]
edge:
  primary_family: filter_ablation
  thesis: A Bollinger-inside-Keltner filter may or may not improve a fixed breakout baseline.
  mechanism: Hold the breakout rule constant and measure the incremental net effect of the squeeze filter.
market:
  asset_classes: [futures]
  venues: [licensed_provider_fixture_then_archive]
  instruments: [diversified_liquid_futures]
  timeframes: [daily]
test:
  next_test: Run paired OOS trials with and without the squeeze filter over a frozen parameter set.
  required_data: [contract_bars, roll_manifest, costs]
  null_or_random_baseline: Identical breakout without the squeeze condition.
  falsification_criteria: [no_incremental_net_benefit, unstable_thresholds, reduced_capacity]
risks:
  costs: [turnover_shift]
  execution: [gap_entry]
  data: [indicator_warmup, roll_adjustment]
  regime: [volatility_clustering]
kill_when: [The filter has no stable OOS improvement over the unfiltered baseline.]
blockers: []
