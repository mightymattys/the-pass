url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=3104816
bibliography: "Lopez de Prado. The 10 Reasons Most Machine Learning Funds Fail. 2018."
claim: Quantitative ML programs often fail because research, data, software, and portfolio construction are organized around avoidable methodological errors.
evidence: The practitioner paper catalogs recurring failure patterns observed across quantitative investment programs.
limitations: The evidence is partly experiential and should guide controls, not establish universal causal frequencies.
market_applicability: [crypto, futures, prediction_markets]
tradable_implication: Separate research roles, keep immutable evidence, and prefer simple falsifiable baselines before ML.
required_tests: [role-separation audit, data provenance audit, baseline-before-ML gate]
