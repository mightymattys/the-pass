claim: Cryptocurrency trading research uses heterogeneous data, features, and increasingly ML-heavy methods, so published results are not directly comparable.
evidence: The open-access mapping study categorizes influential variables, technologies, data inputs, and research directions.
limitations: A mapping study summarizes literature rather than validating the profitability or execution quality of any strategy.
