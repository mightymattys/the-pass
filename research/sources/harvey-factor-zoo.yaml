claim: Conventional significance thresholds are inadequate after testing hundreds of factors; new findings require a materially higher hurdle.
evidence: The paper models correlated multiple testing and reports historical significance cutoffs for a large factor literature.
limitations: Exact cross-sectional factor thresholds do not transfer mechanically to every time-series strategy or market.
