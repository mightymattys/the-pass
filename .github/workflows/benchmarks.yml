name: Framework Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 15 * *"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Install locked benchmark environment
        run: uv sync --locked --extra data --extra research
      - name: Run deterministic scale matrix
        run: uv run python scripts/benchmark_framework.py --sizes 10000 100000 1000000 --output reports/benchmarks/framework.json
      - name: Archive benchmark evidence
        uses: actions/upload-artifact@v7
        with:
          name: framework-benchmark
          path: reports/benchmarks/framework.json
