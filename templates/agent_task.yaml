schema_version: 1
task_id: example-agent-task
created_at: "2026-07-10T00:00:00Z"
caller_provider: codex
target_provider: claude
role: reviewer
objective: Review the supplied evidence and report concrete findings without changing files.
acceptance_criteria: [Every finding cites a repository-relative evidence path.]
workspace_root: ..
input_paths: [README.md]
mode: read_only
allowed_write_paths: []
timeout_seconds: 300
max_output_bytes: 1048576
max_budget_usd: 1.0
allow_native_subagents: false
forbidden_actions:
  - gate_decision
  - live_transaction
  - credential_access
  - permission_bypass
  - recursive_cross_provider
  - apply_patch
  - git_commit
  - git_push
